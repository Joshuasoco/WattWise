name: watt_tracker
description: "Watt Tracker desktop app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  hive_flutter: ^1.1.0
  go_router: ^17.1.0
  equatable: ^2.0.5
  fl_chart: ^1.2.0
  tray_manager:
    path: third_party/tray_manager
  window_manager: ^0.3.9
  local_notifier: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.ico
    - assets/tray_icon.png

flutter_launcher_icons:
  image_path: macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_1024.png
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
  linux:
    generate: true
